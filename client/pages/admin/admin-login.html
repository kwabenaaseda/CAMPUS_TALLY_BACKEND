<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTally – Admin Login</title>
    <link rel="stylesheet" href="../../style/styles.css">
  <link rel="icon" href="../../images/logo.png" type="image/png">

  <style>body { background: #f1f5f9; } .auth-screen { background: #f1f5f9; }</style>
</head>
<body>
<div id="toast-container"></div>

<div class="auth-screen">
  <div style="width:100%;max-width:420px;margin:0 auto;">
    <div style="text-align:center;margin-bottom:32px;" class="fade-in">
      <div style="font-size:13px;font-weight:600;color:var(--text-muted);">CampusTally Admin</div>
      <div style="font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--text);margin-top:8px;">Admin Login</div>
    </div>

    <div class="auth-card fade-in" style="animation-delay:.1s;">
      <div class="form-group">
        <label for="admin-id">Admin ID Code</label>
        <div class="input-wrap">
          <span class="icon">🔑</span>
          <input type="text" id="admin-id" placeholder="Enter your Admin ID Code">
        </div>
      </div>

      <div class="form-group">
        <label for="admin-pw">Admin Password</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="admin-pw" placeholder="Enter your Admin Password">
          <button class="eye" onclick="togglePw('admin-pw', this)">👁️</button>
        </div>
      </div>

      <button class="btn btn-primary" onclick="doAdminLogin()">Admin Access</button>
      <div class="auth-link" style="margin-top:16px;">
        <a href="../../index.html" style="color:var(--primary);font-weight:600;">Switch to Student Login</a>
      </div>
      <div style="margin-top:20px;padding:12px;background:#f0f9ff;border-radius:8px;font-size:12px;color:var(--text-muted);text-align:center;border:1px solid #bae6fd;">
        Demo credentials: <strong style="color:var(--text);">admin</strong> / <strong style="color:var(--text);">admin123</strong>
      </div>
    </div>
  </div>
</div>

<script src="../../script/app.js"></script>
<script>
  if (isAdmin()) window.location.href = './admin-dashboard.html';

 async function doAdminLogin() {
    var id = document.getElementById('admin-id').value.trim();
    var pw = document.getElementById('admin-pw').value.trim();
    if (!id || !pw) { toast('Please enter admin credentials', 'error'); return; }
    if (await adminLogin(id, pw)) {
      toast('Admin access granted ✅', 'success');
      setTimeout(function() { window.location.href = './admin-dashboard.html'; }, 800);
    } else {
      toast('Invalid credentials. Use admin / admin123', 'error');
    }
  }

  document.addEventListener('keydown', function(e) { if (e.key === 'Enter') doAdminLogin(); });
</script>
</body>
</html>
